<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Scholarship Eligibility Form</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Top navigation ── -->
  <nav class="topnav topnav-admin">
    <div class="nav-wrap">
      <div class="brand">
        <span class="brand-icon">🛡️</span>
        <span class="brand-text">Admin Dashboard</span>
      </div>
      <div class="nav-links">
        <a href="index.html">Apply</a>
        <a href="admin.html" class="active">Admin</a>
      </div>
    </div>
  </nav>

  <main class="container">

    <!-- ── Hero section ── -->
    <section class="hero">
      <h1>Manage Scholarship Applications</h1>
      <p>Review submitted applications. Approve or reject based on eligibility criteria.</p>
    </section>

    <!-- ── Stats strip ── -->
    <div class="stats-row">
      <div class="stat-card">
        <span class="stat-label">Total</span>
        <span class="stat-value" id="stat-total">0</span>
      </div>
      <div class="stat-card stat-approved">
        <span class="stat-label">Approved</span>
        <span class="stat-value" id="stat-approved">0</span>
      </div>
      <div class="stat-card stat-pending">
        <span class="stat-label">Pending</span>
        <span class="stat-value" id="stat-pending">0</span>
      </div>
      <div class="stat-card stat-rejected">
        <span class="stat-label">Rejected</span>
        <span class="stat-value" id="stat-rejected">0</span>
      </div>
    </div>

    <!-- ── Filter bar ── -->
    <div class="filter-bar">
      <div class="filter-group">
        <button class="chip active" data-status="all">All</button>
        <button class="chip chip-approved" data-status="approved">Approved</button>
        <button class="chip chip-pending" data-status="pending">Pending</button>
        <button class="chip chip-rejected" data-status="rejected">Rejected</button>
      </div>
    </div>

    <div id="status-msg" class="status-msg"></div>

    <!-- ── Applications Grid ── -->
    <div id="applications-grid" class="applications-grid admin-grid"></div>

  </main>

  <script src="admin.js"></script>
</body>
</html>
