<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload Documents</title>
    <link rel="stylesheet" href="documents.css">
</head>
<body>

<div class="container">

    <h1>Upload Required Documents</h1>
    <p class="subtitle">Please upload all necessary documents for verification</p>

    <form id="docForm">

        <label>Matric Result *</label>
        <input type="file" id="matric" required>

        <label>Intermediate Result *</label>
        <input type="file" id="inter" required>

        <label>CNIC / B-Form *</label>
        <input type="file" id="cnicDoc" required>

        <label>Domicile *</label>
        <input type="file" id="domicile" required>

        <button type="submit">SUBMIT APPLICATION</button>

    </form>

    <p id="result"></p>

</div>

<script src="documents.js"></script>
</body>
</html>
