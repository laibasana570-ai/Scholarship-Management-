<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Scholarship</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>REGISTER</h1>
    <p class="subtitle">Please fill the details to create the account</p>

    <p class="note">
        Note: If your CNIC is already registered, please use the 
        <span>Forgot Password</span> option.
    </p>

    <form id="form">

        <div class="form-grid">

            <div>
                <label>Name *</label>
                <input type="text" id="name" placeholder="Name" required>
            </div>

            <div>
                <label>Email *</label>
                <input type="email" id="email" placeholder="Email" required>
            </div>

            <div>
                <label>Phone *</label>
                <input type="text" id="phone" placeholder="Phone" required>
            </div>

            <div>
                <label>CNIC *</label>
                <input type="text" id="cnic" placeholder="XXXXX-XXXXXXX-X" required>
            </div>

            <div>
                <label>Password *</label>
                <input type="password" id="password" placeholder="Password" required>
            </div>

            <div>
                <label>Confirm Password *</label>
                <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
            </div>

        </div>

        <button type="submit">SIGN UP</button>

    </form>

    <p id="result"></p>

    <p class="login-link">
        Already have an account? <span>Sign In</span>
    </p>

</div>

<script src="script.js"></script>
</body>
</html>
